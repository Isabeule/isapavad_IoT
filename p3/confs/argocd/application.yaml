apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: iot-application
  namespace: argocd

spec:
  project: default

  source:
    repoURL: __REPOSITORY_URL__
    targetRevision: HEAD
    path: p3/confs/app

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
